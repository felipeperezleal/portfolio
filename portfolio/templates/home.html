{%extends 'layout.html'%}

{% block content %}

<h1>home</h1>

<div class="row my-4 text-center">

{% for project in projects %}

<div class="col-md-4 p-4">

    <div class="card bg-light card-project">
        <img src="{{project.image.url}}" alt="{{project.title}}" class="img-fluid"/>
        <div class="card-body">
            <h2>{{project.title}}</h2>
            <p>{{project.description}}</p>
        
            {% if project.url %}
            <a href="{{project.url}}" class="btn btn-light rounded-0 btn-sm" target="_blank">{{project.url}}</a>
            {% endif %}
        </div>
    </div>

</div>


{% endfor %}

{% endblock %}
