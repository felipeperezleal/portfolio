{% extends 'layout.html' %}

{% block content %}

<h1>Blog</h1>

{% for post in posts %}

<div class="p-3">
    <div class="card card-body">
        <div class="row">
            <div class="col-3">
                <img src="{{post.image.url}}" alt="{{post.title}}" class="img-fluid">
            </div>
            
                <h2>{{post.title}}</h2>
                <p>{{post.description|striptags|truncatechars:100}}</p>
                <h2>{{post.date|date:'M d Y'}}</h2>
    
                <a href="{% url 'blog:post_detail' post.id %}" class="btn btn-primary">{{post.title}}</a>
            <div class="col-9">
    
            </div>
        </div>
    </div>
</div>

{% endfor %}

{% endblock %}
