{% extends 'layout.html' %}

{% block content %}

<h1>Post</h1>
<div class="text-center">
    <h2>{{post.title}}</h2>
    <h2 class="my-2 h5 text-muted">{{post.date|date:'F jS Y'}}</h2>
    
    <img src="{{post.image.url}}" alt="{{post.title}}" class="img-fluid"/>
    
    <div class="my-4">
        <p>{{post.description|safe}}</p>
    </div>    
</div>

{% endblock %}
